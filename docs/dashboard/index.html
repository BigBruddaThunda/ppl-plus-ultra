<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPL± Progress Dashboard</title>
<style>
  /* === Reset + Base === */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #1a1a1a;
    --surface:     #242424;
    --border:      #333333;
    --text:        #e0e0e0;
    --text-muted:  #888888;
    --accent:      #4caf50;
    --amber:       #f59e0b;
    --red:         #ef4444;
    --blue:        #3b82f6;
    --purple:      #8b5cf6;
    --font:        'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.6;
    padding: 24px 16px;
    min-height: 100vh;
  }

  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px; }
  p  { color: var(--text-muted); font-size: 12px; }

  .container { max-width: 900px; margin: 0 auto; }

  /* === Header === */
  .header { margin-bottom: 32px; }
  .header h1 { margin-bottom: 4px; }
  .header .subtitle { color: var(--text-muted); font-size: 12px; }

  /* === Card === */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 20px;
  }

  /* === Progress Bar === */
  .progress-bar-wrapper { margin-top: 8px; }
  .progress-numbers {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-numbers .count { color: var(--text); font-size: 18px; font-weight: 700; }
  .bar-track {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .bar-regen {
    height: 100%;
    background: var(--amber);
    border-radius: 4px;
  }
  .progress-legend {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .legend-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* === Deck Grid === */
  .deck-grid-outer { overflow-x: auto; }
  .deck-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(80px, 1fr));
    gap: 4px;
    min-width: 480px;
  }
  .deck-axis-header {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    padding: 4px 2px;
  }
  .deck-cell {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 4px;
    text-align: center;
    font-size: 11px;
    cursor: default;
    transition: border-color 0.2s;
    position: relative;
  }
  .deck-cell:hover { border-color: var(--text-muted); }
  .deck-cell .deck-num { font-size: 10px; color: var(--text-muted); }
  .deck-cell .deck-count { font-weight: 600; }
  .deck-cell.empty  { background: #242424; }
  .deck-cell.partial { background: linear-gradient(135deg, #2d2010 0%, #3d2e0a 100%); border-color: #5a4010; }
  .deck-cell.complete { background: linear-gradient(135deg, #0d2010 0%, #0a2e0a 100%); border-color: #1a5a1a; }

  .order-label {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-muted);
    padding: 6px 4px;
    white-space: nowrap;
  }

  .grid-row {
    display: contents;
  }

  /* Full grid including order labels */
  .deck-grid-with-labels {
    display: grid;
    grid-template-columns: auto repeat(6, minmax(80px, 1fr));
    gap: 4px;
    min-width: 560px;
  }
  .grid-corner { padding: 4px; }

  /* === CX Counter === */
  .cx-counter {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
  }
  .cx-big { font-size: 28px; font-weight: 700; color: var(--accent); }
  .cx-label { color: var(--text-muted); font-size: 12px; }

  .cx-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .cx-bar-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 3px;
  }

  /* === Color Sections === */
  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .color-row:last-child { border-bottom: none; }
  .color-emoji { font-size: 16px; width: 24px; flex-shrink: 0; }
  .color-name { flex: 1; color: var(--text-muted); }
  .color-name strong { color: var(--text); }
  .color-stats { white-space: nowrap; }
  .color-done { color: var(--accent); }
  .color-open { color: var(--text-muted); }
  .mini-bar-track {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: inline-block;
    vertical-align: middle;
    margin-left: 8px;
  }
  .mini-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }

  /* === Two-column layout on wider screens === */
  @media (min-width: 640px) {
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .two-col > .card { margin-bottom: 0; }
  }

  /* === Footer === */
  .footer {
    margin-top: 24px;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }

  /* === Loading / error === */
  .loading { color: var(--text-muted); font-size: 12px; padding: 16px; }
  .error   { color: var(--red); font-size: 12px; padding: 16px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>PPL± Progress Dashboard</h1>
    <p class="subtitle">7 Orders × 6 Axes × 5 Types × 8 Colors = 1,680 rooms</p>
  </div>

  <div id="dashboard">
    <p class="loading">Loading dashboard data...</p>
  </div>

  <div class="footer" id="footer"></div>

</div>

<script>
(function () {
  const $ = (sel, ctx = document) => ctx.querySelector(sel);
  const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

  function pct(n, d) { return d === 0 ? 0 : Math.round((n / d) * 100 * 10) / 10; }

  function progressBar(generated, total, regenNeeded) {
    const genPct = pct(generated, total);
    const regenPct = pct(regenNeeded, total);
    return `
      <div class="progress-bar-wrapper">
        <div class="progress-numbers">
          <div><span class="count">${generated.toLocaleString()}</span> / ${total.toLocaleString()} generated</div>
          <div>${genPct}%</div>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width: ${genPct}%"></div>
        </div>
        <div class="progress-legend">
          <span><span class="legend-dot" style="background:#4caf50"></span>Generated: ${generated}</span>
          <span><span class="legend-dot" style="background:#f59e0b"></span>Regen-needed: ${regenNeeded}</span>
          <span><span class="legend-dot" style="background:#333"></span>Empty: ${total - generated - regenNeeded}</span>
        </div>
      </div>
    `;
  }

  function deckGrid(deckData) {
    const ORDERS = [
      {pos: 1, emoji: '🐂', name: 'Foundation'},
      {pos: 2, emoji: '⛽', name: 'Strength'},
      {pos: 3, emoji: '🦋', name: 'Hypertrophy'},
      {pos: 4, emoji: '🏟', name: 'Performance'},
      {pos: 5, emoji: '🌾', name: 'Full Body'},
      {pos: 6, emoji: '⚖',  name: 'Balance'},
      {pos: 7, emoji: '🖼', name: 'Restoration'},
    ];
    const AXES = [
      {pos: 1, emoji: '🏛', name: 'Basics'},
      {pos: 2, emoji: '🔨', name: 'Functional'},
      {pos: 3, emoji: '🌹', name: 'Aesthetic'},
      {pos: 4, emoji: '🪐', name: 'Challenge'},
      {pos: 5, emoji: '⌛', name: 'Time'},
      {pos: 6, emoji: '🐬', name: 'Partner'},
    ];

    const byDeck = {};
    for (const d of deckData) byDeck[d.deck] = d;

    let html = '<div class="deck-grid-outer"><div class="deck-grid-with-labels">';

    // Header row: corner + axis labels
    html += '<div class="grid-corner"></div>';
    for (const axis of AXES) {
      html += `<div class="deck-axis-header" title="${axis.name}">${axis.emoji}<br>${axis.name.slice(0, 3)}</div>`;
    }

    // Data rows: order label + 6 cells
    for (const order of ORDERS) {
      html += `<div class="order-label" title="${order.name}">${order.emoji} ${order.name.slice(0, 6)}</div>`;
      for (const axis of AXES) {
        const deckNum = (order.pos - 1) * 6 + axis.pos;
        const d = byDeck[deckNum] || {deck: deckNum, generated: 0, total: 40};
        const gen = d.generated || 0;
        const tot = d.total || 40;
        let cls = 'empty';
        if (gen >= tot && tot > 0) cls = 'complete';
        else if (gen > 0) cls = 'partial';
        const label = gen > 0 ? `${gen}/${tot}` : `—`;
        html += `<div class="deck-cell ${cls}" title="Deck ${deckNum}: ${order.name} × ${axis.name} — ${gen}/${tot}">
          <div class="deck-num">${deckNum}</div>
          <div class="deck-count">${label}</div>
        </div>`;
      }
    }

    html += '</div></div>';
    return html;
  }

  function cxSection(cx_done, cx_total) {
    const pctDone = pct(cx_done, cx_total);
    return `
      <div class="cx-counter">
        <div class="cx-big">${cx_done}/${cx_total}</div>
        <div class="cx-label">containers complete</div>
      </div>
      <div class="cx-bar-track">
        <div class="cx-bar-fill" style="width: ${pctDone}%"></div>
      </div>
      <p>${pctDone}% of architecture implemented</p>
    `;
  }

  function colorSections(sections) {
    let html = '';
    for (const s of sections) {
      const total = s.done + s.open;
      const p = pct(s.done, total);
      const miniBar = total > 0
        ? `<span class="mini-bar-track"><span class="mini-bar-fill" style="width:${p}%"></span></span>`
        : '';
      html += `
        <div class="color-row">
          <div class="color-emoji">${s.color}</div>
          <div class="color-name"><strong>${s.name}</strong></div>
          <div class="color-stats">
            <span class="color-done">${s.done} done</span>
            &nbsp;/&nbsp;
            <span class="color-open">${s.open} open</span>
            ${miniBar}
          </div>
        </div>
      `;
    }
    return html;
  }

  function render(data) {
    const generated = data.card_generated || 0;
    const total = data.card_total || 1680;
    const regenNeeded = data.card_regen_needed || 0;

    const html = `
      <div class="card">
        <h2>Card Generation Progress</h2>
        ${progressBar(generated, total, regenNeeded)}
      </div>

      <div class="card">
        <h2>Deck Grid — 7 Orders × 6 Axes</h2>
        <p style="margin-bottom: 12px;">⬜ empty &nbsp; 🟨 partial &nbsp; 🟩 complete</p>
        ${deckGrid(data.deck_grid || [])}
      </div>

      <div class="two-col">
        <div class="card">
          <h2>CX Architecture</h2>
          ${cxSection(data.cx_done || 0, data.cx_total || 36)}
        </div>

        <div class="card">
          <h2>Negotiosum Sections</h2>
          ${colorSections(data.color_sections || [])}
        </div>
      </div>
    `;

    $('#dashboard').innerHTML = html;

    // Footer
    const updated = data.last_updated
      ? new Date(data.last_updated).toLocaleString()
      : 'unknown';
    $('#footer').textContent = `Last updated: ${updated} · Generated from repo state`;
  }

  function renderError(msg) {
    $('#dashboard').innerHTML = `<p class="error">Error loading dashboard data: ${msg}</p>`;
  }

  // Load data
  fetch('data/progress.json')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(render)
    .catch(err => {
      // Fallback: try to load inline for local file:// access
      renderError(err.message + ' (run scripts/build-dashboard-data.py to regenerate)');
    });
})();
</script>
</body>
</html>
